<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perenne</title>

</head>
<body>
    <div class="app-container">
        <!--Encabezado principal -->
        <header class="app-header">
            <div class="header-content">
                <h1>Perenne</h1>
            
            </div>
        </header>

        <!-- NAVEGACIÓN PRINCIPAL -->
        <nav class="main-nav">
            <button class="nav-btn active" data-module="usuarios">Usuarios</button>
            <button class="nav-btn" data-module="clientes">Clientes</button>
            <button class="nav-btn" data-module="productos">Productos</button>
            <button class="nav-btn" data-module="contenido">Contenido</button>
            <button class="nav-btn" data-module="feed">Feed</button>
            <button class="nav-btn" data-module="carrito">Carrito</button>
            <button class="nav-btn" data-module="pagos">Pagos</button>
            <button class="nav-btn" data-module="envios">Envíos</button>
            <button class="nav-btn" data-module="busqueda">Búsqueda</button>
            <button class="nav-btn" data-module="interacciones">Interacciones</button>
            <button class="nav-btn" data-module="notificaciones">Notificaciones</button>
        </nav>

        <!-- CONTENEDOR PRINCIPAL -->
        <main class="main-content">
            <!-- MÓDULO USUARIOS -->
            <section class="module" id="usuarios-module" style="display: block;">
                <h2>Crear usuarios</h2>
                <form id="formUsuario">
                    <input type="text" id="usuarioNombre" placeholder="Nombre" required>
                    <input type="text" id="usuarioApellido" placeholder="Apellido" required>
                    <input type="email" id="usuarioEmail" placeholder="Email" required>
                    <input type="tel" id="usuarioTelefono" placeholder="Teléfono">
                    <input type="password" id="usuarioContrasena" placeholder="Contraseña" required>
                    <select id="usuarioRol">
                        <option value="user">Usuario</option>
                        <option value="collaborator">Colaborador</option>
                    </select>
                    <button type="submit">Registrar usuario</button>
                </form>
                <div id="usuariosLista"></div>
            </section>

            <!-- MÓDULO CLIENTES -->
            <section class="module" id="clientes-module" style="display: none;">
                <h2>Registro de clientes</h2>
                <form id="formCliente">
                    <input type="text" id="clienteNombre" placeholder="Nombre" required>
                    <input type="text" id="clienteApellido" placeholder="Apellido" required>
                    <input type="email" id="clienteEmail" placeholder="Email" required>
                    <input type="tel" id="clienteTelefono" placeholder="Teléfono">
                    <button type="submit">Registrar Cliente</button>
                </form>
                <div id="clientesLista"></div>
            </section>

            <!-- MÓDULO PRODUCTOS -->
            <section class="module" id="productos-module" style="display: none;">
                <h2>Crear un nuevo producto</h2>
                <form id="formProducto">
                    <input type="text" id="productoNombre" placeholder="Nombre" required>
                    <input type="number" id="productoPrecio" placeholder="Precio" required>
                    <input type="number" id="productoStock" placeholder="Stock" required>
                    <input type="url" id="productoImagen" placeholder="URL Imagen">
                    <textarea id="productoDescripcion" placeholder="Descripción"></textarea>
                    <button type="submit">Crear Producto</button>
                </form>
                <div id="productosLista"></div>
            </section>

            <!-- MÓDULO CONTENIDO -->
            <section class="module" id="contenido-module" style="display: none;">
                <h2>Subir nuevo contenido</h2>
                <form id="formContenido">
                    <input type="text" id="contenidoTitulo" placeholder="Título" required>
                    <textarea id="contenidoDescripcion" placeholder="Descripción"></textarea>
                    <select id="contenidoTipo">
                        <option value="video">Vídeo</option>
                        <option value="image">Imagen</option>
                        <option value="pdf">PDF</option>
                        <option value="text">Texto</option>
                        <option value="link">Enlace</option>
                    </select>
                    <input type="url" id="contenidoUrl" placeholder="URL">
                    <button type="submit">Publicar</button>
                </form>
                <div id="contenidoLista"></div>
            </section>

            <!-- MÓDULO FEED -->
            <section class="module" id="feed-module" style="display: none;">
                <h2>Publicaciones</h2>
                <div id="feedLista"></div>
            </section>

            <!-- MÓDULO CARRITO -->
            <section class="module" id="carrito-module" style="display: none;">
                <h2>Carrito de Compras</h2>
                <form id="formCarrito">
                    <select id="carritoProducto" required>
                        <option value="">Selecciona producto...</option>
                    </select>
                    <input type="number" id="carrritoCantidad" placeholder="Cantidad" min="1" required>
                    <button type="submit">Agregar</button>
                </form>
                <div id="carritoLista"></div>
            </section>

            <!-- MÓDULO PAGOS -->
            <section class="module" id="pagos-module" style="display: none;">
                <h2>Gestión de Pagos</h2>
                <form id="formPago">
                    <select id="pagoUsuario" required>
                        <option value="">Selecciona usuario...</option>
                    </select>
                    <input type="number" id="pagoMonto" placeholder="Monto" required>
                    <select id="pagoMetodo">
                        <option value="cash">Efectivo</option>
                        <option value="transfer">Transferencia</option>
                        <option value="card">Tarjeta</option>
                    </select>
                    <button type="submit">Registrar Pago</button>
                </form>
                <div id="pagosLista"></div>
            </section>

            <!-- MÓDULO ENVÍOS -->
            <section class="module" id="envios-module" style="display: none;">
                <h2>Seguimiento de Envíos</h2>
                <form id="formEnvio">
                    <select id="envioCliente" required>
                        <option value="">Selecciona cliente...</option>
                    </select>
                    <input type="text" id="envioDireccion" placeholder="Dirección" required>
                    <input type="text" id="envioCiudad" placeholder="Ciudad" required>
                    <button type="submit">Crear Envío</button>
                </form>
                <div id="enviosLista"></div>
            </section>

            <!-- MÓDULO BÚSQUEDA -->
            <section class="module" id="busqueda-module" style="display: none;">
                <h2>Búsqueda Avanzada</h2>
                <input type="text" id="campoBusqueda" placeholder="Busca aquí...">
                <button onclick="realizarBusqueda()">Buscar</button>
                <div id="resultadosBusqueda"></div>
            </section>

            <!-- MÓDULO INTERACCIONES -->
            <section class="module" id="interacciones-module" style="display: none;">
                <h2>Sistema de Interacciones</h2>
                <div id="interaccionesLista"></div>
            </section>

            <!-- MÓDULO NOTIFICACIONES -->
            <section class="module" id="notificaciones-module" style="display: none;">
                <h2>Notificaciones</h2>
                <div id="notificacionesLista"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
